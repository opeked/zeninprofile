<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THRAGG • Império Viltrumita</title>
<style id="shared-inject"></style>
<style>
/* Hero Principal */
.hero-index {
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

.index-glow {
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(180,0,20,.28) 0%, transparent 70%),
                linear-gradient(180deg, var(--void) 0%, var(--abyss) 40%, var(--deep) 75%, var(--void) 100%);
}

.seal-wrap-index {
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    opacity:0.07;
}

.seal-wrap-index svg {
    width: min(800px, 95vw);
    height: min(800px, 95vw);
}

.hero-content-index { position:relative; z-index:10; }

.hero-eyebrow {
    font-family:'Orbitron',sans-serif;
    font-size:.54rem;
    letter-spacing:.95em;
    color:var(--crimson);
    text-transform:uppercase;
    margin-bottom:2.2rem;
    display:flex;
    align-items:center;
    gap:1.8rem;
    justify-content:center;
    opacity:0;
    animation:rise .9s ease .4s forwards;
}

.hero-eyebrow::before,
.hero-eyebrow::after {
    content:''; display:block; width:65px; height:1px;
    background:linear-gradient(90deg, transparent, var(--crimson));
}
.hero-eyebrow::after { transform:scaleX(-1); }

.hero-name-index {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(4.4rem, 14vw, 9.8rem);
    font-weight:900;
    line-height:.83;
    letter-spacing:.05em;
    color:transparent;
    background:linear-gradient(155deg, #FFF8E0 0%, var(--pale) 15%, var(--gold3) 33%, var(--gold2) 50%, #FFF5D0 57%, var(--gold2) 65%, var(--gold3) 78%, var(--pale) 90%, #FFF8E0 100%);
    -webkit-background-clip:text;
    background-clip:text;
    filter:drop-shadow(0 0 70px rgba(200,154,24,.45));
    opacity:0;
    animation:name-in 1.8s cubic-bezier(.1,1,.2,1) .6s forwards, gold-flow 8s linear 3s infinite;
}

.hero-sub-index {
    font-family:'Cinzel',serif;
    font-size:clamp(.68rem, 1.4vw, .86rem);
    letter-spacing:.45em;
    color:var(--muted);
    text-transform:uppercase;
    margin-top:1.5rem;
    opacity:0;
    animation:rise .9s ease 2.4s forwards;
}

.enter-btn {
    margin-top:4rem;
    padding:1.1rem 3.4rem;
    font-family:'Cinzel',serif;
    font-size:.85rem;
    letter-spacing:.35em;
    text-transform:uppercase;
    background:linear-gradient(135deg, var(--blood), var(--blood2));
    border:1px solid rgba(204,16,32,.6);
    color:var(--pale);
    cursor:pointer;
    transition:all .3s;
    opacity:0;
    animation:rise .9s ease 3s forwards;
}

.enter-btn:hover {
    background:linear-gradient(135deg, var(--blood2), var(--crimson));
    border-color:var(--crimson);
    transform:scale(1.05);
}

/* Seção do Arquivo (vídeo) */
.arquivo-section {
    padding:6rem 2rem 8rem;
    background:linear-gradient(180deg, var(--void), var(--abyss) 30%, var(--deep2) 70%, var(--void));
    position:relative;
}

.arquivo-section::before,
.arquivo-section::after {
    content:''; position:absolute; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--blood), var(--crimson), var(--blood), transparent);
}
.arquivo-section::before { top:0; }
.arquivo-section::after { bottom:0; }

.vid-wrap {
    max-width:920px;
    margin:0 auto;
    position:relative;
    z-index:1;
}

.vid-frame-outer {
    position:relative;
    padding:3px;
    background:linear-gradient(135deg, var(--blood) 0%, var(--gold2) 30%, var(--crimson) 50%, var(--gold2) 70%, var(--blood) 100%);
    background-size:300%;
    animation:border-flow 10s linear infinite;
}

.vid-frame-mid {
    background:var(--abyss);
    padding:10px;
    position:relative;
}

.vid-inner {
    position:relative;
    background:#000;
    overflow:hidden;
}

.vid-inner video {
    display:block;
    width:100%;
    max-height:560px;
    object-fit:contain;
}

.va {
    position:absolute;
    width:34px; height:34px;
    z-index:5;
    border-color:var(--gold2);
    border-style:solid;
}
.va.tl { top:-2px; left:-2px; border-width:3px 0 0 3px; }
.va.tr { top:-2px; right:-2px; border-width:3px 3px 0 0; }
.va.bl { bottom:-2px; left:-2px; border-width:0 0 3px 3px; }
.va.br { bottom:-2px; right:-2px; border-width:0 3px 3px 0; }

.classified {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1.2rem;
    margin:2.5rem 0;
    flex-wrap:wrap;
}

.classified-badge {
    font-family:'Orbitron',sans-serif;
    font-size:.46rem;
    letter-spacing:.55em;
    padding:.55rem 1.6rem;
    border:1px solid rgba(200,16,32,.55);
    color:var(--crimson);
    text-transform:uppercase;
    background:rgba(200,16,32,.06);
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="nav-mount"></div>

<!-- HERO -->
<div class="hero-index">
    <div class="index-glow"></div>
    
    <div class="seal-wrap-index">
      <svg viewBox="0 0 500 500" fill="none">
        <g class="seal-outer"><circle cx="250" cy="250" r="242" stroke="#6B0000" stroke-width="1.5" stroke-dasharray="6 8"/></g>
        <g class="seal-mid"><circle cx="250" cy="250" r="195" stroke="#7A0000" stroke-width="2"/>
          <polygon points="250,55 268,220 250,445 232,220" fill="rgba(180,0,20,.25)" stroke="#AA0010" stroke-width="2"/>
          <polygon points="55,250 220,232 445,250 220,268" fill="rgba(180,0,20,.18)" stroke="#8A0000" stroke-width="1"/>
        </g>
        <g class="seal-inner"><circle cx="250" cy="250" r="130" stroke="#AA0010" stroke-width="2.5"/>
          <circle cx="250" cy="250" r="42" stroke="#CC1020" stroke-width="2" fill="rgba(180,0,20,.25)"/>
        </g>
      </svg>
    </div>

    <div class="hero-content-index">
      <div class="hero-eyebrow">ARQUIVO IMPERIAL • CLASSIFICAÇÃO SUPREMA</div>
      <h1 class="hero-name-index">THRAGG</h1>
      <p class="hero-sub-index">Transmissão Visual do Grão-Regente • Ultra-Secreto</p>
      
      <button class="enter-btn" onclick="document.getElementById('arquivo-section').scrollIntoView({behavior:'smooth'})">
        ◆ ACESSAR O ARQUIVO ◆
      </button>
    </div>
</div>

<!-- SEÇÃO DO VÍDEO (do thragg_arquivo.html) -->
<div id="arquivo-section" class="arquivo-section">
    <div class="vid-wrap">
        <div class="classified">
            <div class="classified-badge">⬛ CLASSIFICAÇÃO: SUPREMA IMPERIAL</div>
            <div class="classified-badge">◆ ACESSO RESTRITO • OLHOS VILTRUMITAS SOMENTE</div>
        </div>

        <div class="vid-frame-outer">
            <div class="vid-frame-mid">
                <div class="vid-inner">
                    <div class="va tl"></div>
                    <div class="va tr"></div>
                    <div class="va bl"></div>
                    <div class="va br"></div>
                    <video controls preload="metadata" id="main-video">
                        <source src="Download__3_.mp4" type="video/mp4">
                        Seu navegador não suporta vídeo.
                    </video>
                </div>
            </div>
        </div>

        <div style="margin-top:2rem; text-align:center; font-family:'Orbitron',sans-serif; font-size:.4rem; letter-spacing:.6em; color:var(--dim);">
            ORIGEM: PLANETA VILTRUM • ARQUIVO CENTRAL • ANO 3000 • CICLO VII
        </div>
    </div>
</div>

<footer class="site-footer">
    <span class="ft-logo">THRAGG</span>
    <div class="ft-sub">Arquivo Visual • Viltrum • Classificado</div>
</footer>

<script src="thragg_data.js"></script>
<script>
document.getElementById('shared-inject').textContent = SHARED_CSS;
document.getElementById('nav-mount').innerHTML = renderNav('index');
initBgCanvas();
DB.bumpVisit('Index');

// Contagem de play do vídeo (igual à página original)
const vid = document.getElementById('main-video');
let vidCounted = false;
vid.addEventListener('play', () => { 
    if(!vidCounted){ 
        DB.bumpPlay('video'); 
        DB.log('Vídeo do Grão-Regente reproduzido','play'); 
        vidCounted = true; 
    } 
});
</script>
</body>
</html>
